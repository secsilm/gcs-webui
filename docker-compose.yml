services:
  gcs-webui:
    build: .
    image: gcs-webui:latest
    container_name: gcs-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Either point to a mounted SA file:
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/sa.json
      # ...or set GCS_SA_JSON to the JSON contents directly (e.g. via secrets)
      # GCS_SA_JSON: ${GCS_SA_JSON}
      # Set GCS_DEMO_MODE=1 to bypass credentials and load fake data:
      # GCS_DEMO_MODE: "1"
    volumes:
      - ./sa.json:/secrets/sa.json:ro
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5
