# Production-style deployment.
#
# By default the app expects each user to sign in via the UI with their own
# service-account JSON — no host volume or env vars are required.
#
#   docker compose up --build
#
# Optionally provide a server-side fallback SA (used when a session has not
# signed in). Either:
#
#   # mount a JSON file next to this compose file
#   ln -s /path/to/sa.json sa.json && docker compose up --build
#
#   # or pass JSON contents from a secret manager
#   GCS_SA_JSON="$(cat /path/to/sa.json)" docker compose up --build
#
# The container runs read-only as a non-root user, with a 256 MB / 0.5 CPU cap.

services:
  gcs-webui:
    build: .
    image: gcs-webui:latest
    container_name: gcs-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Path inside the container to the mounted SA JSON. Ignored if you set
      # GCS_SA_JSON instead.
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/secrets/sa.json}
      GCS_SA_JSON: ${GCS_SA_JSON:-}
    # Mount the SA file read-only. Remove this block if you don't want a
    # server-side fallback (every user must sign in via the UI), or if you use
    # GCS_SA_JSON exclusively.
    # volumes:
    #   - ./sa.json:/secrets/sa.json:ro
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
