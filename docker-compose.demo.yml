# Zero-credentials demo. Use this to try the UI quickly:
#
#   docker compose -f docker-compose.demo.yml up --build
#
# Loads the in-memory FakeStorage (3 buckets, 1500+ objects) — perfect for
# screenshots, evaluation, or local development of the frontend.

services:
  gcs-webui:
    build: .
    image: gcs-webui:latest
    container_name: gcs-webui-demo
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      GCS_DEMO_MODE: "1"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
