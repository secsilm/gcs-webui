<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GCS Browser</title>
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234285F4'/><path d='M9 11h14v3H9zM9 16h14v3H9zM9 21h9v3H9z' fill='white'/></svg>">
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<aside class="sidebar">
  <div class="brand">
    <svg viewBox="0 0 32 32" width="28" height="28" aria-hidden="true">
      <rect width="32" height="32" rx="7" fill="#4285F4"/>
      <path d="M9 11h14v3H9zM9 16h14v3H9zM9 21h9v3H9z" fill="white"/>
    </svg>
    <div>
      <div class="brand-title">GCS Browser</div>
      <div class="brand-sub" id="backend-badge">loading…</div>
    </div>
  </div>

  <div class="sidebar-section-title">Buckets</div>
  <ul id="bucket-list" class="bucket-list" aria-label="buckets"></ul>

  <div class="sidebar-footer">
    <button id="theme-toggle" class="ghost" type="button" title="Toggle theme">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span>Theme</span>
    </button>
    <a class="ghost" href="https://cloud.google.com/storage/docs" target="_blank" rel="noreferrer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      <span>Docs</span>
    </a>
  </div>
</aside>

<main class="main">
  <header class="topbar">
    <nav class="breadcrumbs" id="breadcrumbs" aria-label="path"></nav>
    <div class="topbar-actions">
      <div class="search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" type="search" placeholder="Filter by name…" autocomplete="off">
      </div>
      <button id="refresh" class="ghost" type="button" title="Reload">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        <span>Refresh</span>
      </button>
    </div>
  </header>

  <section class="stats" id="stats">
    <span class="stat" id="stat-folders">0 folders</span>
    <span class="stat-sep">·</span>
    <span class="stat" id="stat-files">0 files</span>
    <span class="stat-sep">·</span>
    <span class="stat" id="stat-size">0 B</span>
  </section>

  <section class="table-wrap">
    <div class="thead">
      <div class="th col-name">Name</div>
      <div class="th col-size">Size</div>
      <div class="th col-updated">Last modified</div>
      <div class="th col-type">Type</div>
      <div class="th col-actions"></div>
    </div>
    <div id="rows" class="tbody" role="list"></div>
    <div id="sentinel" class="sentinel"></div>
    <div id="empty" class="empty hidden">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      <div>No objects in this prefix.</div>
    </div>
  </section>
</main>

<dialog id="object-dialog">
  <form method="dialog" class="dialog-card">
    <header>
      <h3 id="dlg-name">…</h3>
      <button class="icon-btn" type="submit" value="close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </header>
    <dl class="kv">
      <dt>Bucket</dt><dd id="dlg-bucket"></dd>
      <dt>Size</dt><dd id="dlg-size"></dd>
      <dt>Type</dt><dd id="dlg-type"></dd>
      <dt>Updated</dt><dd id="dlg-updated"></dd>
      <dt>Generation</dt><dd id="dlg-generation"></dd>
      <dt>ETag</dt><dd id="dlg-etag"></dd>
    </dl>
    <footer>
      <a id="dlg-download" class="primary" target="_blank" rel="noreferrer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </a>
      <button class="ghost" type="submit" value="close">Close</button>
    </footer>
  </form>
</dialog>

<script type="module" src="/static/app.js"></script>
</body>
</html>
